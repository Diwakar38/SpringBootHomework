<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Home</title>
    <style>
        body {
          margin: 0;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #fceabb, #f8b500);
          font-family: 'Segoe UI', Arial, sans-serif;
        }
        .card {
          background: rgba(255, 255, 255, 0.9);
          padding: 50px 70px;
          border-radius: 20px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.15);
          text-align: center;
        }
        h1 {
          font-size: 3em;
          margin: 0 0 10px;
          color: #4a3b2c;
        }
        p {
          font-size: 1.2em;
          color: #6b5b4a;
          margin: 0;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🏡 Welcome Home!</h1>
    <p>You've successfullly logged in using Google OAuth2</p>
</div>
</body>
</html>
